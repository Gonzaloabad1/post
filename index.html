<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réplica de Publicación de Instagram</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="instagram-post">
        
        <div class="image-container">
            <div class="dashed-line top"></div>
            <div class="dashed-line bottom"></div>
            <img src="./img/libros.png" alt="Presentación Novela">
        </div>

        <div class="post-interaction">
            <div class="icons-container">
                <div class="left-icons">
                    <i class="far fa-heart"></i> 
                    <i class="far fa-comment"></i> 
                    <i class="far fa-paper-plane"></i> 
                </div>
                <div class="right-icons">
                    <i class="far fa-bookmark"></i> 
                </div>
            </div>
        </div>

        <div class="post-text-content">
            
            <div class="likes-info-wrapper">
                <div class="user-avatars">
                    <img src="https://www.miciudadreal.es/wp-content/uploads/2024/04/Rafa_Diaz_Serendipia_1.jpg" alt="User 1" class="avatar">
                    <img src="https://www.caritas.org.mx/wp-content/uploads/2019/02/cualidades-persona-humanitaria.jpg" alt="User 2" class="avatar">
                    <img src="https://serendipiaeditorial.com/wp-content/uploads/2024/08/Pedro_Martin_Romo.jpg" alt="User 3" class="avatar">
                    <div class="avatar-more">+12</div>
                </div>
                <div class="liked-by">
                    Les gusta a <span class="bold">rafaeldiaz_barral</span> y <span class="bold">11 personas más</span>
                </div>
            </div>

            <div class="caption">
                <span class="username bold">gonzaloabadcm1993</span>
                <span class="text">
                    ✨ Mil gracias a todos los que me acompañasteis hoy en la presentación de mi novela #ElEnigmaDeLaCiudadImperial...
                </span>
            </div>

            <div class="comment-section">
                <div class="view-all">Ver los 5 comentarios</div>
                <div class="comment">
                    <span class="username bold">aimi.allover</span>
                    <span class="text">Great shot <span class="hashtag">#toocute</span></span>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <i class="fas fa-home"></i>
            <i class="fas fa-search"></i>
            <i class="far fa-plus-square"></i>
            <i class="fas fa-video"></i> <i class="fas fa-user-circle"></i>
        </div>

    </div>

</body>
</html>
